<!DOCTYPE html>
<html lang="en" class="bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Plus | Cloud Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } },
            },
        }
    </script>
    <style>
        #transaction-list::-webkit-scrollbar { width: 6px; }
        #transaction-list::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        #transaction-list::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .transaction-item:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-start justify-center p-4">

    <div id="auth-screen" class="w-full max-w-sm mt-12 md:mt-24">
        <div class="bg-white shadow-xl rounded-2xl p-6 md:p-8 border border-gray-100">
            <div class="flex justify-center mb-4">
                <div class="bg-blue-100 p-3 rounded-full text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </div>
            </div>
            <h2 id="auth-title" class="text-2xl font-bold text-gray-800 text-center mb-2">Welcome Back</h2>
            <p id="auth-subtitle" class="text-gray-500 text-center text-sm mb-6">Sign in to sync your financial data.</p>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label for="auth-email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label for="auth-password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required minlength="6">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 text-white font-semibold py-2.5 px-4 rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 mt-2">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm">
                <span id="auth-toggle-text" class="text-gray-600">Don't have an account?</span>
                <button id="auth-toggle-btn" class="text-blue-600 font-semibold hover:underline focus:outline-none">Sign Up</button>
            </div>
            <p id="auth-error" class="text-red-500 text-sm mt-4 text-center hidden font-medium"></p>
        </div>
    </div>

    <div id="app-container" class="w-full max-w-5xl bg-white shadow-lg rounded-2xl p-6 md:p-8 hidden mt-8 mb-24">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Financial Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1 flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    Account: <span id="user-display-email" class="font-semibold text-gray-700"></span>
                </p>
            </div>
            
            <div class="flex items-center gap-3 flex-wrap">
                <select id="month-filter" class="px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-700 font-medium text-sm">
                    <option value="all">All Time</option>
                </select>
                
                <button id="toggle-privacy-btn" class="text-sm px-3 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition duration-200 flex items-center gap-2">
                    <svg id="eye-open-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                    <svg id="eye-closed-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>
                    <span id="privacy-text" class="hidden sm:inline">Hide</span>
                </button>

                <button id="logout-btn" class="text-sm px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-lg hover:bg-red-100 font-semibold transition duration-200 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" /></svg>
                    Logout
                </button>
            </div>
        </header>

        <section id="summary" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
            <div class="bg-blue-50 p-4 rounded-xl shadow-sm flex flex-col justify-center border border-blue-100">
                <div class="flex items-center space-x-2 mb-2">
                    <div class="bg-blue-100 p-1.5 rounded-md"><svg class="w-4 h-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a2.25 2.25 0 0 1-2.25 2.25H5.25a2.25 2.25 0 0 1-2.25-2.25V5.25A2.25 2.25 0 0 1 5.25 3h13.5A2.25 2.25 0 0 1 21 5.25V12ZM10.5 16.5c0 .966-.784 1.75-1.75 1.75h-1.5a1.75 1.75 0 1 1 0-3.5h1.5a1.75 1.75 0 0 1 1.75 1.75v.5Z" /></svg></div>
                    <h2 class="text-xs font-bold text-blue-700 uppercase tracking-wide">Net Balance</h2>
                </div>
                <p id="balance" class="text-xl font-bold text-blue-900 break-all">...</p>
            </div>
            
            <div class="bg-green-50 p-4 rounded-xl shadow-sm flex flex-col justify-center border border-green-100">
                <div class="flex items-center space-x-2 mb-2">
                    <div class="bg-green-100 p-1.5 rounded-md"><svg class="w-4 h-4 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941" /></svg></div>
                    <h2 class="text-xs font-bold text-green-700 uppercase tracking-wide">Income</h2>
                </div>
                <p id="total-income" class="text-xl font-bold text-green-900 break-all">...</p>
            </div>

            <div class="bg-red-50 p-4 rounded-xl shadow-sm flex flex-col justify-center border border-red-100">
                <div class="flex items-center space-x-2 mb-2">
                    <div class="bg-red-100 p-1.5 rounded-md"><svg class="w-4 h-4 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6 9 12.75l4.306-4.306a11.95 11.95 0 0 1 5.814 5.518l2.74 1.22m0 0-5.94 2.281m5.94-2.28-2.28-5.941" /></svg></div>
                    <h2 class="text-xs font-bold text-red-700 uppercase tracking-wide">Expense</h2>
                </div>
                <p id="total-expense" class="text-xl font-bold text-red-900 break-all">...</p>
            </div>

            <div class="bg-purple-50 p-4 rounded-xl shadow-sm flex flex-col justify-center border border-purple-100">
                <div class="flex items-center space-x-2 mb-2">
                    <div class="bg-purple-100 p-1.5 rounded-md"><svg class="w-4 h-4 text-purple-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5-3.75H3.75" /></svg></div>
                    <h2 class="text-xs font-bold text-purple-700 uppercase tracking-wide">Savings</h2>
                </div>
                <p id="total-savings" class="text-xl font-bold text-purple-900 break-all">...</p>
            </div>

            <div class="bg-orange-50 p-4 rounded-xl shadow-sm flex flex-col justify-center border border-orange-100">
                <div class="flex items-center space-x-2 mb-2">
                    <div class="bg-orange-100 p-1.5 rounded-md"><svg class="w-4 h-4 text-orange-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg></div>
                    <h2 class="text-xs font-bold text-orange-700 uppercase tracking-wide">Active Debt</h2>
                </div>
                <p id="total-debt" class="text-xl font-bold text-orange-900 break-all">...</p>
            </div>
        </section>

        <section id="add-transaction" class="mb-8 bg-gray-50 p-5 rounded-xl border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Log New Transaction</h2>
            <form id="transaction-form" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="md:col-span-2 lg:col-span-1">
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <input type="text" id="description" placeholder="e.g., Salary, Shop Debt" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" required>
                </div>
                <div>
                    <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Amount (RWF)</label>
                    <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" required>
                </div>
                <div>
                    <label for="transaction-date" class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    <input type="date" id="transaction-date" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" required>
                </div>
                <div class="md:col-span-2 lg:col-span-1">
                    <label for="type" class="block text-sm font-medium text-gray-700 mb-1">Transaction Type</label>
                    <select id="type" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="income">Income (+ Balance)</option>
                        <option value="expense">Expense (- Balance)</option>
                        <option value="savings">Savings (- Balance)</option>
                        <option value="log_debt">Log New Debt (+ Debt)</option>
                        <option value="pay_debt">Pay Off Debt (- Balance, - Debt)</option>
                    </select>
                </div>
                <div class="flex items-end md:col-span-2 lg:col-span-4">
                    <button type="submit" id="save-transaction-btn" class="w-full bg-gray-900 text-white font-semibold py-2.5 px-4 rounded-lg shadow-md hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition duration-200">
                        Save Transaction
                    </button>
                </div>
            </form>
            <p id="form-error" class="text-red-500 text-sm mt-3 hidden font-medium"></p>
        </section>

        <section id="history">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800">Ledger History</h2>
            </div>
            <ul id="transaction-list" class="max-h-80 overflow-y-auto pr-2 space-y-2">
                <li id="no-transactions" class="text-gray-500 text-center py-8 bg-gray-50 rounded-lg border border-dashed border-gray-300">Loading data...</li>
            </ul>
        </section>
    </div>

    <script type="module">
        // 1. Import Firebase securely (ADDED sendEmailVerification here)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 2. Your Exact Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC0IubcRgd4A5MOsLxGLqzztxzLscjxu4k",
            authDomain: "myfinancialplus-91d8e.firebaseapp.com",
            projectId: "myfinancialplus-91d8e",
            storageBucket: "myfinancialplus-91d8e.firebasestorage.app",
            messagingSenderId: "104340531737",
            appId: "1:104340531737:web:6000e9c1b3d2bd9df41888",
            measurementId: "G-Q6MKYYXP2K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Global State ---
        let transactions = [];
        let currentUser = null;
        let isSignUpMode = false;
        let isPrivacyMode = false;

        // --- DOM Elements ---
        const authScreen = document.getElementById('auth-screen');
        const appContainer = document.getElementById('app-container');
        const authForm = document.getElementById('auth-form');
        const authEmailInput = document.getElementById('auth-email');
        const authPasswordInput = document.getElementById('auth-password');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authToggleText = document.getElementById('auth-toggle-text');
        const authErrorEl = document.getElementById('auth-error');

        const logoutBtn = document.getElementById('logout-btn');
        const userDisplayEmail = document.getElementById('user-display-email');
        const togglePrivacyBtn = document.getElementById('toggle-privacy-btn');
        const monthFilterEl = document.getElementById('month-filter');
        const listEl = document.getElementById('transaction-list');
        const saveTransactionBtn = document.getElementById('save-transaction-btn');

        document.getElementById('transaction-date').valueAsDate = new Date();

        // --- Auth Listeners & Actions ---

        // Listen for Login/Logout state changes automatically
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authScreen.classList.add('hidden');
                appContainer.classList.remove('hidden');
                userDisplayEmail.textContent = user.email;
                fetchDataFromCloud();
            } else {
                currentUser = null;
                appContainer.classList.add('hidden');
                authScreen.classList.remove('hidden');
            }
        });

        // Toggle between Sign In and Sign Up visually
        authToggleBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            authErrorEl.classList.add('hidden');
            if(isSignUpMode) {
                authTitle.textContent = "Create Account";
                authSubtitle.textContent = "Sign up to track your finances anywhere.";
                authSubmitBtn.textContent = "Sign Up";
                authToggleText.textContent = "Already have an account?";
                authToggleBtn.textContent = "Sign In";
            } else {
                authTitle.textContent = "Welcome Back";
                authSubtitle.textContent = "Sign in to sync your financial data.";
                authSubmitBtn.textContent = "Sign In";
                authToggleText.textContent = "Don't have an account?";
                authToggleBtn.textContent = "Sign Up";
            }
        });

        // Handle Form Submit for Firebase Auth
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            authErrorEl.classList.add('hidden');
            const email = authEmailInput.value.trim();
            const password = authPasswordInput.value;
            
            authSubmitBtn.textContent = "Processing...";
            authSubmitBtn.disabled = true;

            try {
                if (isSignUpMode) {
                    // UPDATED: Now creates the user and sends the verification email
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCredential.user);
                    alert("Account created successfully! Please check your email to verify your account.");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                authErrorEl.textContent = error.message.replace("Firebase: ", "");
                authErrorEl.classList.remove('hidden');
            } finally {
                authSubmitBtn.textContent = isSignUpMode ? "Sign Up" : "Sign In";
                authSubmitBtn.disabled = false;
            }
        });

        // Handle Logout
        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // --- Cloud Data Operations ---

        async function fetchDataFromCloud() {
            if (!currentUser) return;
            try {
                // UPDATED: Changed "userId" to "uid" to match Firestore Rules
                const q = query(
                    collection(db, "transactions"), 
                    where("uid", "==", currentUser.uid),
                    orderBy("timestamp", "desc")
                );
                
                const querySnapshot = await getDocs(q);
                transactions = [];
                querySnapshot.forEach((doc) => {
                    transactions.push({ id: doc.id, ...doc.data() });
                });
                
                updateUI();
            } catch (error) {
                console.error("Error fetching data: ", error);
                listEl.innerHTML = '<li class="text-red-500 text-center py-4">Error loading data. Check Firestore Rules.</li>';
            }
        }

        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('form-error').classList.add('hidden');
            const desc = document.getElementById('description').value.trim();
            const amt = parseFloat(document.getElementById('amount').value);
            const dateVal = document.getElementById('transaction-date').value;

            if (!desc || isNaN(amt) || amt <= 0 || !dateVal || !currentUser) return;

            saveTransactionBtn.textContent = "Saving to Cloud...";
            saveTransactionBtn.disabled = true;

            // UPDATED: Changed "userId" to "uid" to match Firestore Rules going forward
            const newTx = {
                uid: currentUser.uid, 
                description: desc,
                amount: amt,
                type: document.getElementById('type').value,
                timestamp: new Date(dateVal + 'T12:00:00Z').toISOString()
            };

            try {
                // Add to Firebase
                const docRef = await addDoc(collection(db, "transactions"), newTx);
                
                // Add to local array to update UI instantly without reloading
                transactions.unshift({ id: docRef.id, ...newTx });
                
                // Reset Form
                document.getElementById('description').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('transaction-date').valueAsDate = new Date(); 
                monthFilterEl.value = 'all';
                updateUI();

            } catch (error) {
                console.error("Error adding transaction: ", error);
                document.getElementById('form-error').textContent = "Database error. Check permissions.";
                document.getElementById('form-error').classList.remove('hidden');
            } finally {
                saveTransactionBtn.textContent = "Save Transaction";
                saveTransactionBtn.disabled = false;
            }
        });

        // Global Delete function
        window.deleteTransaction = async (id) => {
            if (!confirm("Delete this transaction permanently?")) return;
            try {
                await deleteDoc(doc(db, "transactions", id));
                transactions = transactions.filter(t => t.id !== id);
                updateUI();
            } catch (error) {
                console.error("Error deleting document: ", error);
                alert("Error deleting. Check your permissions.");
            }
        };


        // --- Formatting & UI Logic ---

        function formatCurrency(num) {
            if (isPrivacyMode) return '*** RWF';
            return new Intl.NumberFormat('fr-RW', { style: 'currency', currency: 'RWF', currencyDisplay: 'code', minimumFractionDigits: 0 }).format(num);
        }

        function getTransactionIcon(type) {
            switch (type) {
                case 'income': return `<svg class="w-5 h-5 text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>`;
                case 'expense': return `<svg class="w-5 h-5 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>`;
                case 'savings': return `<svg class="w-5 h-5 text-purple-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" /></svg>`;
                case 'log_debt': return `<svg class="w-5 h-5 text-orange-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>`;
                case 'pay_debt': return `<svg class="w-5 h-5 text-teal-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>`;
                default: return '';
            }
        }

        togglePrivacyBtn.addEventListener('click', () => {
            isPrivacyMode = !isPrivacyMode;
            document.getElementById('eye-open-icon').classList.toggle('hidden', isPrivacyMode);
            document.getElementById('eye-closed-icon').classList.toggle('hidden', !isPrivacyMode);
            document.getElementById('privacy-text').textContent = isPrivacyMode ? 'Show' : 'Hide';
            updateUI();
        });

        monthFilterEl.addEventListener('change', updateUI);

        function updateUI() {
            // Options Update
            const currentVal = monthFilterEl.value;
            monthFilterEl.innerHTML = '<option value="all">All Time</option>';
            const uniqueMonths = new Set();
            transactions.forEach(t => uniqueMonths.add(`${new Date(t.timestamp).getFullYear()}-${String(new Date(t.timestamp).getMonth() + 1).padStart(2, '0')}`));
            Array.from(uniqueMonths).sort().reverse().forEach(my => {
                const [year, month] = my.split('-');
                const option = document.createElement('option');
                option.value = my; option.textContent = new Date(year, month - 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
                monthFilterEl.appendChild(option);
            });
            monthFilterEl.value = Array.from(uniqueMonths).includes(currentVal) ? currentVal : 'all';

            // Filter & Render
            let dataToRender = monthFilterEl.value === 'all' ? transactions : transactions.filter(t => `${new Date(t.timestamp).getFullYear()}-${String(new Date(t.timestamp).getMonth() + 1).padStart(2, '0')}` === monthFilterEl.value);
            
            listEl.innerHTML = '';
            if (dataToRender.length === 0) {
                listEl.innerHTML = '<li class="text-gray-500 text-center py-8 bg-gray-50 rounded-lg border border-dashed border-gray-300">No entries found.</li>';
            } else {
                dataToRender.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(t => {
                    const item = document.createElement('li');
                    item.classList.add('transaction-item', 'flex', 'justify-between', 'items-center', 'bg-white', 'p-4', 'rounded-lg', 'border', 'border-gray-100', 'shadow-sm');
                    
                    let amountSign = '-'; let amountClass = 'text-gray-600';
                    if (t.type === 'income') { amountSign = '+'; amountClass = 'text-green-600'; }
                    else if (t.type === 'expense') { amountSign = '-'; amountClass = 'text-red-600'; }
                    else if (t.type === 'savings') { amountSign = '-'; amountClass = 'text-purple-600'; }
                    else if (t.type === 'log_debt') { amountSign = '+'; amountClass = 'text-orange-600'; } 
                    else if (t.type === 'pay_debt') { amountSign = '-'; amountClass = 'text-teal-600'; }

                    item.innerHTML = `
                        <div class="flex items-center gap-4 flex-grow">
                            <div class="flex-shrink-0 bg-gray-50 p-2 rounded-full border border-gray-100">${getTransactionIcon(t.type)}</div>
                            <div>
                                <span class="block font-semibold text-gray-800 text-base">${t.description}</span>
                                <span class="block text-xs font-medium text-gray-400 mt-0.5">${new Date(t.timestamp).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 flex-shrink-0">
                            <span class="${amountClass} font-bold text-base text-right">${isPrivacyMode ? '' : amountSign}${formatCurrency(Math.abs(t.amount))}</span>
                            <button class="delete-btn text-gray-300 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-md transition duration-200 opacity-0 md:opacity-100 focus:opacity-100" onclick="window.deleteTransaction('${t.id}')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            }

            // Summary Math
            let inc=0, exp=0, sav=0, logD=0, payD=0;
            dataToRender.forEach(t => {
                const val = Math.abs(t.amount);
                if (t.type === 'income') inc += val;
                else if (t.type === 'expense') exp += val;
                else if (t.type === 'savings') sav += val;
                else if (t.type === 'log_debt') logD += val;
                else if (t.type === 'pay_debt') payD += val;
            });
            document.getElementById('balance').textContent = formatCurrency(inc - exp - sav - payD);
            document.getElementById('total-income').textContent = formatCurrency(inc);
            document.getElementById('total-expense').textContent = formatCurrency(exp);
            document.getElementById('total-savings').textContent = formatCurrency(sav);
            document.getElementById('total-debt').textContent = formatCurrency(Math.max(0, logD - payD));
        }
    </script>
</body>
</html>
